name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm test
      - name: Create api_keys.json
        run: echo '{"GEMINI_API_KEY":"${{ secrets.SECRET_API_KEY }}"}' > src/api_keys.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LETMECOOKSOFTENG }}
          channelId: live
          projectId: letmecooksofteng