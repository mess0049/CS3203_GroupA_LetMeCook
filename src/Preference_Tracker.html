<!DOCTYPE html>
<html>
<head>
  <title>Preference Tracker — LetMeCook</title>
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
    }
  }
  </script>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h2   { margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-top: 0; font-size: 0.9rem; }
    fieldset { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; margin-bottom: 1.5rem; }
    legend   { font-weight: bold; }
    label    { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }
    select, input[type="number"] {
      width: 100%; padding: 0.4rem; border: 1px solid #bbb; border-radius: 4px; font-size: 0.95rem;
    }
    button   { padding: 0.45rem 1.1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn-add { background: #2ecc71; color: #fff; }
    .btn-rm  { background: #e74c3c; color: #fff; font-size: 0.8rem; padding: 0.25rem 0.6rem; }
    .btn-back{ background: #3498db; color: #fff; margin-top: 1rem; }
    #prefList { list-style: none; padding: 0; }
    #prefList li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee;
    }
    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
      font-size: 0.75rem; font-weight: bold; margin-right: 0.4rem;
      text-transform: uppercase;
    }
    .badge-cuisine  { background: #fde68a; color: #78350f; }
    .badge-diet     { background: #bbf7d0; color: #065f46; }
    .badge-allergy  { background: #fecaca; color: #7f1d1d; }
    .badge-maxcooktime { background: #bfdbfe; color: #1e3a5f; }
    #error   { color: #c0392b; min-height: 1.2em; margin-bottom: 0.5rem; }
    #counter { font-size: 0.85rem; color: #555; margin-bottom: 0.5rem; }
    .schema-hint { font-size: 0.78rem; color: #888; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <h2>Preference Tracker</h2>
  <p class="subtitle">
    Your preferences are applied automatically when searching for recipes in the Meal Tracker.
    <br>Max <strong>20</strong> preferences · Max <strong>10</strong> changes per minute.
  </p>

  <!-- Add preference form -->
  <fieldset>
    <legend>Add a Preference</legend>

    <label for="prefKey">Preference type</label>
    <select id="prefKey" onchange="updateHint()">
      <option value="">— select —</option>
      <option value="cuisine">Cuisine</option>
      <option value="diet">Diet</option>
      <option value="allergy">Allergy / Intolerance</option>
      <option value="maxCookTime">Max Cook Time (minutes)</option>
    </select>

    <div id="enumField" style="display:none; margin-top:0.6rem;">
      <label for="prefValueEnum">Value</label>
      <select id="prefValueEnum"></select>
    </div>

    <div id="intField" style="display:none; margin-top:0.6rem;">
      <label for="prefValueInt">Value (minutes, 5–480)</label>
      <input type="number" id="prefValueInt" min="5" max="480" placeholder="e.g. 30" />
    </div>

    <p id="schemaHint" class="schema-hint"></p>
    <p id="error"></p>

    <button class="btn-add" onclick="handleAdd()">Add Preference</button>
  </fieldset>

  <!-- Current preferences -->
  <fieldset>
    <legend>Your Preferences</legend>
    <p id="counter">Loading…</p>
    <ul id="prefList"><li>Loading…</li></ul>
  </fieldset>

  <button class="btn-back" onclick="location.href='dashboard.html'">← Back to Dashboard</button>

  <script type="module">
    import { observeAuth } from "./UserAuthentication/auth.js";
    import {
      listPreferences,
      addPreference,
      removePreference,
      PREFERENCE_SCHEMA,
    } from "./Preference_Tracker.js";

    let currentUID = null;

    // ── Auth guard ──────────────────────────────────────────────────────────
    observeAuth((uid) => {
      if (!uid) { window.location.href = "login.html"; return; }
      currentUID = uid;
      renderPrefs();
    });

    // ── Render preference list ──────────────────────────────────────────────
    async function renderPrefs() {
      const list    = document.getElementById("prefList");
      const counter = document.getElementById("counter");
      try {
        const items = await listPreferences(currentUID);
        counter.textContent = `${items.length} / 20 preferences used`;
        list.innerHTML = "";

        if (items.length === 0) {
          list.innerHTML = "<li>No preferences yet.</li>";
          return;
        }

        items.forEach((p, i) => {
          const li = document.createElement("li");
          const badgeClass = "badge-" + p.key.replace("maxCookTime", "maxcooktime");
          li.innerHTML = `
            <span>
              <span class="badge ${badgeClass}">${p.key}</span>
              ${p.value}${p.key === "maxCookTime" ? " min" : ""}
            </span>
            <button class="btn-rm" data-index="${i}">Remove</button>
          `;
          list.appendChild(li);
        });

        list.querySelectorAll(".btn-rm").forEach((btn) => {
          btn.onclick = async () => {
            clearError();
            try {
              await removePreference(currentUID, Number(btn.dataset.index));
              renderPrefs();
            } catch (e) {
              showError(e);
            }
          };
        });
      } catch (e) {
        showError(e);
      }
    }

    // ── Add handler ─────────────────────────────────────────────────────────
    window.handleAdd = async function () {
      clearError();
      const key = document.getElementById("prefKey").value;
      if (!key) { showError({ message: "Please select a preference type." }); return; }

      const schema = PREFERENCE_SCHEMA[key];
      let value;
      if (schema.type === "enum") {
        value = document.getElementById("prefValueEnum").value;
      } else {
        value = document.getElementById("prefValueInt").value;
      }

      try {
        await addPreference(currentUID, key, value);
        renderPrefs();
        document.getElementById("prefKey").value = "";
        document.getElementById("enumField").style.display = "none";
        document.getElementById("intField").style.display  = "none";
        document.getElementById("schemaHint").textContent  = "";
      } catch (e) {
        showError(e);
      }
    };

    // ── Hint / field toggle ─────────────────────────────────────────────────
    window.updateHint = function () {
      const key    = document.getElementById("prefKey").value;
      const schema = PREFERENCE_SCHEMA[key];
      const enumF  = document.getElementById("enumField");
      const intF   = document.getElementById("intField");
      const hint   = document.getElementById("schemaHint");
      const sel    = document.getElementById("prefValueEnum");

      enumF.style.display = "none";
      intF.style.display  = "none";
      hint.textContent    = "";

      if (!schema) return;

      if (schema.type === "enum") {
        enumF.style.display = "block";
        sel.innerHTML = schema.values
          .map((v) => `<option value="${v}">${v}</option>`)
          .join("");
        hint.textContent = `Allowed values: ${schema.values.join(", ")}`;
      } else if (schema.type === "integer") {
        intF.style.display = "block";
        hint.textContent = `Enter a number between ${schema.min} and ${schema.max} minutes.`;
      }
    };

    // ── Helpers ─────────────────────────────────────────────────────────────
    function showError(e) {
      const msg = e.code === 429
        ? "Too many interactions — please wait a moment and try again."
        : e.message || "An error occurred.";
      document.getElementById("error").textContent = msg;
    }

    function clearError() {
      document.getElementById("error").textContent = "";
    }
  </script>
</body>
</html>
