<!DOCTYPE html>
<html>
<head>
  <title>Pantry Tracker</title>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
    }
  }
  </script>
  <style>
    body { font-family: Arial; padding: 20px; line-height: 1.6; }
    select, button { margin: 5px; padding: 8px 12px; cursor: pointer; }
    #summary { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  </style>
</head>
<body>

    <header>
        <h1>"User" Pantry</h1>
        <p>Check ingredients and get recipes.</p>
    </header>

    <main>
        <section id="user_ingredient">
            <h2>Your Refrigerator</h2>
            <div id ="add-ingredient-form">
                <input id="addName" type="text" placeholder="Ingredient name" />
                <input id="addQuantity" type="number" placeholder="Quantity" min="1" />
                <button onclick="addIngredient()">Add Ingredient</button>
            </div>
            <table id="pantryTable">
                <tbody id="pantryBody">
                </tbody>
            </table>
            <!--data in database-->
        </section>

        <section id="recipe-recommendation">
            <h3>Recommend Recipe</h3>
            <h4>Choose your recipe!</h4>
            <button onclick="recommend()">Get Recommended Recipes</button>
            <ol id="Choosed_Recipes">
            </ol>
        </section>

        <button onclick="location.href='dashboard.html'">Return to home page</button>
    </main>

    <script type="module" src="Pantry_Tracker.js"></script>

  
</body>
</html>
