<!DOCTYPE html>
<html>
<head>
  <title>Change Password</title>
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
      "firebase/performance": "https://www.gstatic.com/firebasejs/10.8.1/firebase-performance.js"
    }
  }
  </script>
</head>
<body>
  <h2>Change Password</h2>

  <label>Current Password</label><br>
  <input id="currentPassword" type="password" placeholder="Current Password"><br><br>

  <label>New Password</label><br>
  <input id="newPassword" type="password" placeholder="New Password">
  <p id="err-uppercase" style="color:red;display:none;margin:4px 0">Must contain at least one uppercase letter.</p>
  <p id="err-number"    style="color:red;display:none;margin:4px 0">Must contain at least one number.</p>
  <p id="err-special"   style="color:red;display:none;margin:4px 0">Must contain at least one special character.</p>
  <br>

  <label>Confirm New Password</label><br>
  <input id="confirmPassword" type="password" placeholder="Confirm New Password">
  <p id="err-match" style="color:red;display:none;margin:4px 0">Passwords do not match.</p>
  <br>

  <button id="changeBtn">Change Password</button>
  <button onclick="location.href='../dashboard.html'">Cancel</button>

  <script type="module">
    import { changePassword, validatePassword, observeAuth } from "./auth.js";

    observeAuth((uid) => {
      if (!uid) window.location.href = "login.html";
    });

    const newPasswordInput = document.getElementById("newPassword");
    let submitAttempted = false;

    function updateValidationUI() {
      const pw = newPasswordInput.value;
      if (!pw && !submitAttempted) {
        document.getElementById("err-uppercase").style.display = "none";
        document.getElementById("err-number").style.display = "none";
        document.getElementById("err-special").style.display = "none";
        return;
      }
      document.getElementById("err-uppercase").style.display = /[A-Z]/.test(pw) ? "none" : "block";
      document.getElementById("err-number").style.display    = /[0-9]/.test(pw) ? "none" : "block";
      document.getElementById("err-special").style.display   = /[^a-zA-Z0-9]/.test(pw) ? "none" : "block";
    }

    newPasswordInput.addEventListener("input", updateValidationUI);

    document.getElementById("changeBtn").onclick = async () => {
      submitAttempted = true;
      const currentPassword = document.getElementById("currentPassword").value;
      const newPassword = newPasswordInput.value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      updateValidationUI();

      const errors = validatePassword(newPassword);
      if (errors.length > 0) return;

      const matchError = document.getElementById("err-match");
      if (newPassword !== confirmPassword) {
        matchError.style.display = "block";
        return;
      }
      matchError.style.display = "none";

      try {
        await changePassword(currentPassword, newPassword);
        alert("Password changed successfully!");
        window.location.href = "../dashboard.html";
      } catch (err) {
        alert(err.message);
      }
    };
  </script>
</body>
</html>
