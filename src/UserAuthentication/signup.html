<!-- the signup page -->

<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>
        <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
            "firebase/performance": "https://www.gstatic.com/firebasejs/10.8.1/firebase-performance.js"
          }
        }
        </script>
        <style>
          body { font-family: sans-serif; background: #f9f9f9; }
          .page-container { max-width: 420px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
          h2 { text-align: center; font-size: 2rem; margin-bottom: 1.5rem; color: #2e8b57; }
          label { display: block; margin-top: 1rem; font-weight: 600; color: #333; }
          input { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
          .pw-error { color: red; font-size: 0.875rem; margin: 4px 0 0; display: none; }
          .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; }
          button { flex: 1; padding: 10px 16px; background: #2e8b57; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
          button:hover { background: #256f46; }
          button.secondary { background: #6c757d; }
          button.secondary:hover { background: #5a6268; }
        </style>
    </head>
<body>

<div class="page-container">
  <h2>Sign Up</h2>

  <label>Email</label>
  <input id="email" type="email" placeholder="you@example.com">

  <label>Password</label>
  <input id="password" type="password" placeholder="Password">
  <p id="err-uppercase" class="pw-error">Must contain at least one uppercase letter.</p>
  <p id="err-number"    class="pw-error">Must contain at least one number.</p>
  <p id="err-special"   class="pw-error">Must contain at least one special character.</p>

  <div class="btn-row">
    <button id="signupBtn">Sign Up</button>
    <button class="secondary" onclick="location.href='../index.html'">Return</button>
  </div>
</div>

  <script type="module">
    import { signup, validatePassword } from "./auth.js";

    const passwordInput = document.getElementById("password");
    let submitAttempted = false;

    function updateValidationUI() {
      const pw = passwordInput.value;
      if (!pw && !submitAttempted) {
        document.getElementById("err-uppercase").style.display = "none";
        document.getElementById("err-number").style.display = "none";
        document.getElementById("err-special").style.display = "none";
        return;
      }
      document.getElementById("err-uppercase").style.display = /[A-Z]/.test(pw) ? "none" : "block";
      document.getElementById("err-number").style.display    = /[0-9]/.test(pw) ? "none" : "block";
      document.getElementById("err-special").style.display   = /[^a-zA-Z0-9]/.test(pw) ? "none" : "block";
    }

    passwordInput.addEventListener("input", updateValidationUI);

    document.getElementById("signupBtn").onclick = async () => {
      submitAttempted = true;
      const email = document.getElementById("email").value;
      const password = passwordInput.value;

      updateValidationUI();

      const errors = validatePassword(password);
      if (errors.length > 0) return;

      try {
        await signup(email, password);
        alert("Account created!");
        window.location.href = "../dashboard.html";
      } catch (err) {
        alert(err.message);
      }
    };
  </script>
</body>
</html>
