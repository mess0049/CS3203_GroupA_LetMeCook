<!DOCTYPE html>
<html>
<head>
  <title>Meal Tracker — LetMeCook</title>
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
    }
  }
  </script>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h2   { margin-bottom: 0.25rem; }
    fieldset { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; margin-bottom: 1.5rem; }
    legend   { font-weight: bold; }
    input[type="text"], input[type="date"] {
      padding: 0.4rem; border: 1px solid #bbb; border-radius: 4px; font-size: 0.95rem;
    }
    button { padding: 0.45rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn-search { background: #f39c12; color: #fff; }
    .btn-save   { background: #2ecc71; color: #fff; }
    .btn-nav    { background: #3498db; color: #fff; margin-right: 0.5rem; }
    .btn-rm     { background: #e74c3c; color: #fff; font-size: 0.8rem; padding: 0.25rem 0.5rem; margin-left: 0.5rem; }
    #searchResults { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
    .recipe-card {
      border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem;
      width: 200px; display: flex; flex-direction: column; gap: 0.4rem;
      font-size: 0.85rem;
    }
    .recipe-card img { border-radius: 4px; width: 100%; height: 100px; object-fit: cover; }
    .recipe-card strong { font-size: 0.9rem; }
    .recipe-card .btn-save { margin-top: auto; font-size: 0.8rem; padding: 0.3rem 0.6rem; }
    #mealList { list-style: none; padding: 0; }
    #mealList li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.35rem 0; border-bottom: 1px solid #eee; font-size: 0.9rem;
    }
    .pref-note { font-size: 0.8rem; color: #888; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <h2>Meal Tracker</h2>

  <!-- Recipe search -->
  <fieldset>
    <legend>Search Recipes</legend>
    <p class="pref-note">Results are automatically filtered by your saved preferences.</p>
    <input id="recipeSearch" type="text" placeholder="e.g. chicken pasta" style="width:55%;" />
    <button class="btn-search" onclick="handleMealSearch()">Search</button>
    <div id="searchResults"></div>
  </fieldset>

  <!-- Manual entry -->
  <fieldset>
  <legend>Add Meal Manually</legend>
  <input id="mealName" type="text" placeholder="Meal name" />
  <input id="cookDate" type="date" />
  <input id="mealCalories" type="number" min="1" placeholder="Calories (optional)" />
  <button class="btn-save" onclick="saveMeal()">Save Meal</button>
</fieldset>

  <!-- Planned meals -->
  <fieldset>
    <legend>Planned Meals</legend>
    <ul id="mealList"><li>Loading…</li></ul>
  </fieldset>

  <button class="btn-nav" onclick="location.href='Preference_Tracker.html'">⚙ Preferences</button>
  <button class="btn-nav" onclick="location.href='dashboard.html'">← Dashboard</button>

  <script type="module">
    import { saveMeal, handleMealSearch, addRecipeToMeals } from "./Meal_Tracker.js";
    // Expose to inline onclick handlers
    window.saveMeal        = saveMeal;
    window.handleMealSearch = handleMealSearch;
    window.addRecipeToMeals = addRecipeToMeals;
  </script>
</body>
</html>
