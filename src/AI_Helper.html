<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LetMeCook AI Helper</title>
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
    </script>
</head>
<body>
    <div style="width: 400px; border: 1px solid #ccc; padding: 10px; font-family: sans-serif;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin-top: 0; margin-bottom: 10px;">🍳 LetMeCook AI Helper</h3>
            <select id="lang-select" style="padding: 4px;">
                <option value="English">English</option>
                <option value="Korean">한국어</option>
                <option value="Spanish">Español</option>
                <option value="Japanese">日本語</option>
            </select>
        </div>
        <div id="chat-history" style="height: 300px; overflow-y: auto; border: 1px solid #eee; margin-bottom: 10px; padding: 10px;"></div>
        <div style="display: flex;">
            <input type="text" id="user-input" placeholder="Type your questions..." style="flex: 1; padding: 8px;">
            <button id="send-btn" style="padding: 8px 15px; background: #2e8b57; color: white; border: none; cursor: pointer;">Send</button>
        </div>
    </div>

    <script type="module" src="AI_Helper.js"></script>
</body>
</html>
